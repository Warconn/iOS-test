name: Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build and Test (iOS Simulator)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List available simulators
        run: xcrun simctl list devices available --json | python3 -c "
import json, sys
data = json.load(sys.stdin)
for runtime, devices in data['devices'].items():
    if 'iOS' in runtime:
        for d in devices:
            if d['isAvailable']:
                print(f\"{runtime}: {d['name']} ({d['udid']})\")
" | head -20

      - name: Build
        working-directory: HeroesAscent
        run: |
          xcodebuild build \
            -project HeroesAscent.xcodeproj \
            -scheme HeroesAscent \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild build \
            -project HeroesAscent.xcodeproj \
            -scheme HeroesAscent \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        working-directory: HeroesAscent
        run: |
          xcodebuild test \
            -project HeroesAscent.xcodeproj \
            -scheme HeroesAscent \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult \
            | xcpretty --report junit --output test-results.xml || true

          # Run again without xcpretty if above fails (xcpretty may not be installed)
          xcodebuild test \
            -project HeroesAscent.xcodeproj \
            -scheme HeroesAscent \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            HeroesAscent/TestResults.xcresult
            HeroesAscent/test-results.xml
          if-no-files-found: ignore
