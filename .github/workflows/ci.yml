name: Build & Test – Both Games

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  # ── HeroesAscent ─────────────────────────────────────────────────────
  heroes-ascent:
    name: HeroesAscent – Build & Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use latest available Xcode 15
          XCODE=$(ls /Applications | grep '^Xcode_15' | sort -V | tail -1)
          sudo xcode-select -s "/Applications/${XCODE}/Contents/Developer"
          xcodebuild -version

      - name: Build
        working-directory: HeroesAscent
        run: |
          set -o pipefail
          xcodebuild build \
            -project HeroesAscent.xcodeproj \
            -scheme HeroesAscent \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild build \
              -project HeroesAscent.xcodeproj -scheme HeroesAscent \
              -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
              -configuration Debug CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Test
        working-directory: HeroesAscent
        run: |
          set -o pipefail
          xcodebuild test \
            -project HeroesAscent.xcodeproj \
            -scheme HeroesAscent \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heroesascent-test-results
          path: HeroesAscent/TestResults.xcresult
          if-no-files-found: ignore

  # ── SpaceTrader ───────────────────────────────────────────────────────
  space-trader:
    name: SpaceTrader – Build & Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls /Applications | grep '^Xcode_15' | sort -V | tail -1)
          sudo xcode-select -s "/Applications/${XCODE}/Contents/Developer"
          xcodebuild -version

      - name: Build
        working-directory: SpaceTrader
        run: |
          set -o pipefail
          xcodebuild build \
            -project SpaceTrader.xcodeproj \
            -scheme SpaceTrader \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild build \
              -project SpaceTrader.xcodeproj -scheme SpaceTrader \
              -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
              -configuration Debug CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Test
        working-directory: SpaceTrader
        run: |
          set -o pipefail
          xcodebuild test \
            -project SpaceTrader.xcodeproj \
            -scheme SpaceTrader \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload results
        if: always()
