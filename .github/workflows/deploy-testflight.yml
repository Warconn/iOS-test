name: Deploy to TestFlight

# Trigger manually or on push to main after tests pass
on:
  workflow_dispatch:
    inputs:
      notes:
        description: "Release notes for this build"
        required: false
        default: "New build from CI"
  push:
    branches: [main, master]
    paths:
      - "HeroesAscent/**"

jobs:
  deploy:
    name: Archive & Upload to TestFlight
    runs-on: macos-14
    # Only deploy on push to main (not on PRs)
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      # ── Code signing ──────────────────────────────────────────────────
      # You need these secrets set in GitHub repo Settings → Secrets:
      #   DIST_CERT_BASE64       – base64 of your .p12 distribution certificate
      #   DIST_CERT_PASSWORD     – password for the .p12
      #   PROVISION_PROFILE_BASE64 – base64 of your .mobileprovision file
      #   KEYCHAIN_PASSWORD      – any random string used as keychain password
      #   APPLE_TEAM_ID          – your 10-char Apple Developer Team ID
      #   ASC_KEY_ID             – App Store Connect API Key ID
      #   ASC_ISSUER_ID          – App Store Connect Issuer ID
      #   ASC_KEY_BASE64         – base64 of your .p8 API key file

      - name: Install signing certificate
        env:
          DIST_CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/dist_cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain

          echo "$DIST_CERT_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROVISION_PROFILE_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── Archive ───────────────────────────────────────────────────────
      - name: Archive app
        working-directory: HeroesAscent
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project HeroesAscent.xcodeproj \
            -scheme HeroesAscent \
            -configuration Release \
            -archivePath $RUNNER_TEMP/HeroesAscent.xcarchive \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="HeroesAscent AppStore"

      # ── Export IPA ────────────────────────────────────────────────────
      - name: Create export options plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/HeroesAscent.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates

      # ── Upload to TestFlight ──────────────────────────────────────────
      - name: Upload to TestFlight via altool
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode \
            -o ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/HeroesAscent.ipa" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

      - name: Upload IPA as artifact (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: HeroesAscent-ipa
          path: ${{ runner.temp }}/export/HeroesAscent.ipa
          if-no-files-found: ignore
